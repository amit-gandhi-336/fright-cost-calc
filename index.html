<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Freight Quote</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <style>
      :root {
        --primary: #4f46e5;
        --bg: #f8fafc;
        --card-bg: #ffffff;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --accent: #f1f5f9;
        --danger: #dc2626;
      }

      body {
        font-family: 'Inter', sans-serif;
        background-color: var(--bg);
        color: var(--text-main);
        margin: 0;
        padding: 40px 20px;
      }

      .container {
        max-width: 900px;
        margin: 0 auto;
        background: var(--card-bg);
        padding: 40px;
        border-radius: 16px;
        box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
      }

      header {
        text-align: center;
        margin-bottom: 32px;
        border-bottom: 1px solid var(--border);
        padding-bottom: 20px;
      }

      h2 { margin: 0; font-size: 1.75rem; font-weight: 700; color: #0f172a; }

      .grid-form {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
        margin-bottom: 30px;
      }

      .input-group { display: flex; flex-direction: column; gap: 8px; }

      label { font-size: 0.875rem; font-weight: 600; color: var(--text-muted); }

      input, select {
        padding: 10px 14px;
        border: 1px solid var(--border);
        border-radius: 8px;
        font-size: 14px;
      }

      .table-container {
        overflow-x: auto;
        margin: 24px 0;
        border: 1px solid var(--border);
        border-radius: 12px;
      }

      table { width: 100%; border-collapse: collapse; }
      th { background: var(--accent); padding: 12px 16px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted); text-align: left; }
      td { padding: 10px 16px; border-top: 1px solid var(--border); }

      .btn-secondary {
        background: #fff; color: var(--primary); border: 1px solid var(--primary);
        padding: 8px 16px; font-weight: 600; border-radius: 8px; cursor: pointer;
      }

      .btn-primary {
        width: 100%; background: var(--primary); color: white; border: none;
        padding: 16px; font-size: 16px; font-weight: 700; border-radius: 8px; cursor: pointer; margin-top: 20px;
      }

      .result-card { background: var(--accent); padding: 30px; border-radius: 12px; border: 1px solid var(--border); margin-top: 30px; }
      
      .summary-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 12px 0;
        font-size: 15px;
      }
      .summary-row strong { color: #1e293b; font-weight: 700; }
      .summary-row span { color: #64748b; }

      .extra-info-row {
        padding: 12px;
        margin: 5px 0 15px 0;
        font-size: 13px;
        color: #4338ca;
        background: #eff6ff;
        border-left: 4px solid var(--primary);
        border-radius: 4px;
        text-align: left;
        line-height: 1.5;
      }

      .summary-row.total {
        border-top: 2px solid var(--primary);
        margin-top: 15px;
        padding-top: 20px;
        font-weight: 700;
        font-size: 1.25rem;
        color: var(--primary);
      }
      
      .per-unit-row {
        color: var(--danger);
        margin-top: 15px;
        padding-top: 10px;
        font-weight: 800;
        font-size: 1.8rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      /* PRINT STYLES */
      @media print {
        @page {
          margin: 0.5cm; /* Controls page margins */
          size: auto;   /* Logic to remove browser headers/footers */
        }
        body { margin: 1cm; background: #fff; }
        header h2 { display: none; } 
        header { border-bottom: none; margin-bottom: 0; padding: 0; }
        .btn-primary, .btn-secondary, .grid-form, .table-container, label { display: none; }
        .container { box-shadow: none; padding: 0; width: 100%; }
        .result-card { background: #fff; border: 1px solid #eee; padding: 20px; }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <header><h2 id="mainHeading">Freight Cost Calculator</h2></header>

      <div class="grid-form">
        <div class="input-group"><label>Customer Name</label><input type="text" id="customerName" placeholder="e.g. Amit"></div>
        <div class="input-group"><label>Pincode (First 3 digits)</label><input type="number" id="pincode" placeholder="e.g. 121"></div>
        <div class="input-group">
          <label>Serviceability / ODA</label>
          <select id="odaType">
            <option value="serviceable">Standard Serviceable</option>
            <option value="A">ODA A</option>
            <option value="B">ODA B</option>
            <option value="C">ODA C</option>
            <option value="D">ODA D</option>
            <option value="E">ODA E</option>
          </select>
        </div>
      </div>

      <div class="table-container">
        <table id="items">
          <thead><tr><th>Item</th><th>Weight (kg)</th><th>Rate (₹)</th><th>Qty</th></tr></thead>
          <tbody>
            <tr><td style="color: var(--text-muted); font-weight: 600;">1</td>
            <td><input type="number" step="any"></td><td><input type="number" step="any"></td><td><input type="number"></td></tr>
          </tbody>
        </table>
      </div>

      <div style="display: flex; gap: 10px;">
        <button class="btn-secondary" onclick="addItem()">+ Add Item</button>
        <button class="btn-secondary" style="border-color: #cbd5e1; color: #64748b;" onclick="location.reload()">Clear All</button>
      </div>

      <button class="btn-primary" onclick="calculateFreight()">Calculate Final Freight</button>

      <div id="output"></div>
    </div>

    <script>
      let itemCount = 1;
      function addItem() {
        itemCount++;
        const table = document.getElementById("items").getElementsByTagName('tbody')[0];
        const row = table.insertRow();
        row.innerHTML = `<td style="color: var(--text-muted); font-weight: 600;">${itemCount}</td><td><input type="number" step="any"></td><td><input type="number" step="any"></td><td><input type="number"></td>`;
      }

      const stateRates = [
        { state: "Haryana", start: 121, end: 136, rate: 7 },
        { state: "Delhi", start: 110, end: 110, rate: 7 },
        { state: "Maharashtra", start: 400, end: 445, rate: 5 },
        // ... (Add other state data here)
      ];

      const odaSlabs = {
        A: [{min:1, max:4000, charge:11000}], 
        B: [{min:1, max:4000, charge:12500}],
        C: [{min:1, max:4000, charge:15000}],
        D: [{min:1, max:4000, charge:18000}],
        E: [{min:1, max:4000, charge:25000}]
      };

      const extraKgRates = { A: 3, B: 3, C: 5, D: 7, E: 8 };

      function calculateFreight() {
        const customer = document.getElementById("customerName").value || "Customer";
        let totalQty = 0, totalWeight = 0, invoiceValue = 0;

        document.querySelectorAll("#items tbody tr").forEach((r) => {
          let inp = r.querySelectorAll("input");
          let w = +inp[0].value || 0, r1 = +inp[1].value || 0, q = +inp[2].value || 0;
          totalQty += q; totalWeight += w * q; invoiceValue += r1 * q;
        });

        totalWeight = Math.ceil(totalWeight);
        const pin = document.getElementById("pincode").value;
        const first3 = parseInt(pin.substring(0, 3));
        let stateName = "Haryana", stateRate = 7;
        stateRates.forEach((s) => { if (first3 >= s.start && first3 <= s.end) { stateName = s.state; stateRate = s.rate; } });

        let basicRateCharge = totalWeight * stateRate;
        const oda = document.getElementById("odaType").value;
        let odaCharge = 0;
        let extraInfo = "";

        if (oda !== "serviceable") {
          let slabMax = Math.ceil(odaSlabs[oda][0].charge / 2);
          if (totalWeight <= 4000) {
            odaCharge = slabMax; 
          } else {
            let extraWeight = totalWeight - 4000;
            let perKg = extraKgRates[oda];
            let extraCost = extraWeight * perKg;
            odaCharge = slabMax + extraCost;
            extraInfo = `<strong>ODA Calculation Detail:</strong><br>Slab for 4000kg: ₹${slabMax}<br>Extra Weight: ${extraWeight}kg × ₹${perKg}/kg = ₹${extraCost}`;
          }
        }

        let docket = 100, fod = 100;
        let invoiceWithGST = invoiceValue + Math.ceil(invoiceValue * 0.18);
        let fov = Math.ceil(invoiceWithGST * 0.001);
        let beforeFSC = Math.ceil(basicRateCharge + docket + fod + fov + odaCharge);
        let fsc = Math.ceil(beforeFSC * 0.08);
        let subtotalExclGST = Math.ceil(beforeFSC + fsc);
        let gst = Math.ceil(subtotalExclGST * 0.18);
        let totalWithTax = subtotalExclGST + gst;
        
        let perTyre = totalQty > 0 ? (subtotalExclGST / totalQty).toFixed(2) : 0;

        // Set the Page Title for Filename Suggestion
        const today = new Date().toLocaleDateString('en-GB').replace(/\//g, '-');
        document.title = `${customer} - ${today}`;

        document.getElementById("output").innerHTML = `
          <div class="result-card">
            <h2 style="text-align: center; color: var(--primary); margin-top: 0; padding-bottom: 20px; border-bottom: 2px solid var(--border);">Freight Quote: ${customer}</h2>
            <div class="summary-row"><span>Destination State:</span> <strong>${stateName}</strong></div>
            <div class="summary-row"><span>Total Quantity:</span> <strong>${totalQty} Nos</strong></div>
            <div class="summary-row"><span>Total Weight:</span> <strong>${totalWeight} kg</strong></div>
            <div class="summary-row"><span>Basic Rate (₹${stateRate}/kg):</span> <strong>₹${basicRateCharge}</strong></div>
            <div class="summary-row"><span>ODA Charges:</span> <strong>₹${odaCharge}</strong></div>
            ${extraInfo ? `<div class="extra-info-row">${extraInfo}</div>` : ''}
            <div class="summary-row"><span>Fuel Surcharge (FSC 8%):</span> <strong>₹${fsc}</strong></div>
            <div class="summary-row"><span>Fixed (Docket/FOD/FOV):</span> <strong>₹${docket + fod + fov}</strong></div>
            
            <div class="summary-row total">
                <span>Total Payable (Incl. GST):</span> 
                <span>₹${totalWithTax}</span>
            </div>

            <div class="per-unit-row">
                <span>Per Unit Cost (Excl. GST):</span> 
                <span>₹${perTyre}</span>
            </div>

            <button class="btn-secondary" onclick="window.print()" style="width: 100%; margin-top: 25px;">Download / Print PDF</button>
          </div>`;
      }
    </script>
  </body>
</html>

<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Freight Quote</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root{
--primary:#4f46e5;
--bg:#f8fafc;
--card-bg:#ffffff;
--text-main:#1e293b;
--text-muted:#64748b;
--border:#e2e8f0;
--accent:#f1f5f9;
--danger:#dc2626;
}

body{
font-family:'Inter',sans-serif;
background:var(--bg);
margin:0;
padding:40px 20px;
}

.container{
max-width:900px;
margin:auto;
background:white;
padding:40px;
border-radius:16px;
box-shadow:0 10px 25px -5px rgba(0,0,0,0.05);
}

header{text-align:center;margin-bottom:30px;border-bottom:1px solid var(--border);padding-bottom:20px;}

h2{margin:0;font-size:1.7rem}

.grid-form{
display:grid;
grid-template-columns:1fr 1fr;
gap:20px;
margin-bottom:25px;
}

.input-group{display:flex;flex-direction:column;gap:8px}

label{font-size:0.85rem;color:var(--text-muted);font-weight:600}

input,select{
padding:10px;
border:1px solid var(--border);
border-radius:8px;
}

table{
width:100%;
border-collapse:collapse;
}

th{
background:var(--accent);
padding:10px;
font-size:12px;
text-transform:uppercase;
}

td{
padding:8px;
border-top:1px solid var(--border);
}

.table-container{
overflow-x:auto;
border:1px solid var(--border);
border-radius:10px;
margin-bottom:20px;
}

.btn-secondary{
padding:8px 15px;
border:1px solid var(--primary);
background:white;
color:var(--primary);
font-weight:600;
border-radius:8px;
cursor:pointer;
}

.btn-primary{
width:100%;
margin-top:20px;
padding:15px;
border:none;
background:var(--primary);
color:white;
font-size:16px;
font-weight:700;
border-radius:8px;
cursor:pointer;
}

.result-card{
margin-top:30px;
background:var(--accent);
padding:30px;
border-radius:10px;
border:1px solid var(--border);
}

.summary-row{
display:flex;
justify-content:space-between;
padding:10px 0;
}

.summary-row.total{
border-top:2px solid var(--primary);
margin-top:10px;
padding-top:15px;
font-size:20px;
font-weight:700;
color:var(--primary);
}

.per-unit-row{
font-size:26px;
font-weight:800;
color:var(--danger);
margin-top:10px;
display:flex;
justify-content:space-between;
}

</style>
</head>

<body>

<div class="container">

<header>
<h2>Freight Cost Calculator</h2>
</header>

<div class="grid-form">

<div class="input-group">
<label>Customer Name</label>
<input type="text" id="customerName">
</div>

<div class="input-group">
<label>Pincode (First 3 digits)</label>
<input type="number" id="pincode">
</div>

<div class="input-group">
<label>Serviceability / ODA</label>

<select id="odaType">
<option value="serviceable">Standard Serviceable</option>
<option value="A">ODA A</option>
<option value="B">ODA B</option>
<option value="C">ODA C</option>
<option value="D">ODA D</option>
<option value="E">ODA E</option>
</select>

</div>

</div>

<div class="table-container">

<table id="items">

<thead>
<tr>
<th>Item</th>
<th>Weight (kg)</th>
<th>Invoice Rate (₹)</th>
<th>Qty</th>
</tr>
</thead>

<tbody>

<tr>
<td>1</td>
<td><input type="number"></td>
<td><input type="number"></td>
<td><input type="number"></td>
</tr>

</tbody>

</table>

</div>

<div style="display:flex;gap:10px;">
<button class="btn-secondary" onclick="addItem()">+ Add Item</button>
<button class="btn-secondary" onclick="location.reload()">Clear</button>
</div>

<button class="btn-primary" onclick="calculateFreight()">Calculate Freight</button>

<div id="output"></div>

</div>

<script>

let itemCount=1

function addItem(){

itemCount++

const table=document.getElementById("items").getElementsByTagName('tbody')[0]

const row=table.insertRow()

row.innerHTML=`<td>${itemCount}</td>
<td><input type="number"></td>
<td><input type="number"></td>
<td><input type="number"></td>`

}

const stateRates=[
{state:"Haryana",start:121,end:136,rate:7},
{state:"Delhi",start:110,end:110,rate:7},
{state:"Maharashtra",start:400,end:445,rate:5},
{state:"Gujarat",start:360,end:396,rate:5}
]

const odaSlabs={
A:[{min:1,max:100,charge:700},{min:101,max:250,charge:850},{min:251,max:500,charge:1650}],
B:[{min:1,max:100,charge:750},{min:101,max:250,charge:1100},{min:251,max:500,charge:2250}],
C:[{min:1,max:100,charge:1450},{min:101,max:250,charge:2250},{min:251,max:500,charge:3300}],
D:[{min:1,max:100,charge:2750},{min:101,max:250,charge:4500},{min:251,max:500,charge:6600}],
E:[{min:1,max:100,charge:5500},{min:101,max:250,charge:9000},{min:251,max:500,charge:11000}]
}

function calculateFreight(){

let totalQty=0
let totalWeight=0
let invoiceValue=0

document.querySelectorAll("#items tbody tr").forEach(r=>{

let inp=r.querySelectorAll("input")

let weight=parseFloat(inp[0].value)||0
let rate=parseFloat(inp[1].value)||0
let qty=parseInt(inp[2].value)||0

totalWeight+=weight*qty
invoiceValue+=rate*qty
totalQty+=qty

})

totalWeight=Math.ceil(totalWeight)

const pin=document.getElementById("pincode").value
const first3=parseInt(pin.substring(0,3))

let stateName="Not Found"
let stateRate=0

stateRates.forEach(s=>{

if(first3>=s.start && first3<=s.end){

stateName=s.state
stateRate=s.rate

}

})

let basicRateCharge=totalWeight*stateRate

const oda=document.getElementById("odaType").value

let odaCharge=0

if(oda!=="serviceable"){

odaSlabs[oda].forEach(s=>{

if(totalWeight>=s.min && totalWeight<=s.max){

odaCharge=Math.ceil(s.charge/2)

}

})

}

let docket=100
let fod=100

let fov=Math.ceil((invoiceValue*1.18)/1000)

let basicRateTotal=Math.ceil(
basicRateCharge+
docket+
fod+
odaCharge+
fov
)

let fsc=Math.ceil(basicRateTotal*0.08)

let subtotalExclGST=Math.ceil(basicRateTotal+fsc)

let gst=Math.ceil(subtotalExclGST*0.18)

let totalWithTax=subtotalExclGST+gst

let perUnit= totalQty>0 ? (subtotalExclGST/totalQty).toFixed(2) : 0

document.getElementById("output").innerHTML=`

<div class="result-card">

<h2 style="text-align:center">Freight Quote</h2>

<div class="summary-row"><span>State</span><strong>${stateName}</strong></div>

<div class="summary-row"><span>Total Qty</span><strong>${totalQty}</strong></div>

<div class="summary-row"><span>Total Weight</span><strong>${totalWeight} kg</strong></div>

<div class="summary-row">
<span>Basic Freight (₹${stateRate}/kg)</span>
<strong>₹${basicRateCharge}</strong>
</div>

<div class="summary-row"><span>ODA</span><strong>₹${odaCharge}</strong></div>

<div class="summary-row"><span>FOV</span><strong>₹${fov}</strong></div>

<div class="summary-row"><span>Docket + FOD</span><strong>₹200</strong></div>

<div class="summary-row"><span>FSC (8%)</span><strong>₹${fsc}</strong></div>

<div class="summary-row total"><span>Total (Incl GST)</span><span>₹${totalWithTax}</span></div>

<div class="per-unit-row"><span>Per Unit Cost</span><span>₹${perUnit}</span></div>

<button class="btn-secondary" onclick="window.print()" style="width:100%;margin-top:20px;">Print / Save PDF</button>

</div>

`

}

</script>

</body>
</html>
